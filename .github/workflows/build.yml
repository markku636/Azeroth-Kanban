name: Build Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, k8s]
    timeout-minutes: 120
    env:
      IMAGE_NAME: azeroth-kanban
      BRANCH_NAME: ${{ github.ref_name }}
      SHORT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push image
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_INTERNAL_URL: ${{ secrets.REGISTRY_INTERNAL_URL }}
        run: |
          set -e
          PUSH_URL="${REGISTRY_INTERNAL_URL:-${REGISTRY_URL}}"
          REGISTRY_HOST="${PUSH_URL#http://}"
          REGISTRY_HOST="${REGISTRY_HOST#https://}"
          REGISTRY_HOST=$(echo "$REGISTRY_HOST" | tr -d '[:space:]')
          SHORT="${SHORT_SHA:0:7}"

          echo "$REGISTRY_PASSWORD" | docker login -u "$REGISTRY_USER" --password-stdin "$REGISTRY_HOST"

          IMG_SHA="${REGISTRY_HOST}/library/${IMAGE_NAME}/${BRANCH_NAME}:${SHORT}"
          IMG_LATEST="${REGISTRY_HOST}/library/${IMAGE_NAME}/${BRANCH_NAME}:latest"

          docker build \
            -f Dockerfile \
            -t "$IMG_SHA" \
            -t "$IMG_LATEST" \
            .

          docker push "$IMG_SHA"
          docker push "$IMG_LATEST"
