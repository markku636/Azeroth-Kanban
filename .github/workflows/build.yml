name: Build Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, k8s]
    timeout-minutes: 120
    container:
      image: gcr.io/kaniko-project/executor:v1.21.0-debug
      options: --entrypoint=""
    env:
      IMAGE_NAME: azeroth-kanban
      BRANCH_NAME: ${{ github.ref_name }}
      SHORT_SHA: ${{ github.sha }}
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      REGISTRY_INTERNAL_URL: ${{ secrets.REGISTRY_INTERNAL_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Kaniko docker config
        shell: sh
        run: |
          PUSH_URL="${REGISTRY_INTERNAL_URL:-${REGISTRY_URL}}"
          REGISTRY_HOST="${PUSH_URL#http://}"
          REGISTRY_HOST="${REGISTRY_HOST#https://}"
          REGISTRY_HOST=$(echo "$REGISTRY_HOST" | tr -d '[:space:]')
          echo "REGISTRY_HOST=$REGISTRY_HOST" >> $GITHUB_ENV
          mkdir -p /kaniko/.docker
          AUTH=$(printf "%s:%s" "$REGISTRY_USER" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')
          echo "{\"auths\":{\"$REGISTRY_HOST\":{\"auth\":\"$AUTH\"}}}" > /kaniko/.docker/config.json

      - name: Build & Push with Kaniko
        shell: sh
        run: |
          SHORT="${SHORT_SHA:0:7}"
          /kaniko/executor \
            --context ${{ github.workspace }} \
            --dockerfile ${{ github.workspace }}/Dockerfile \
            --destination ${REGISTRY_HOST}/library/${IMAGE_NAME}/${BRANCH_NAME}:${SHORT} \
            --destination ${REGISTRY_HOST}/library/${IMAGE_NAME}/${BRANCH_NAME}:latest \
            --insecure \
            --insecure-registry=${REGISTRY_HOST} \
            --skip-tls-verify \
            --skip-tls-verify-registry=${REGISTRY_HOST} \
            --insecure-pull \
            --cache=true \
            --cache-ttl=24h \
            --verbosity=info \
            --snapshot-mode=redo \
            --use-new-run=true