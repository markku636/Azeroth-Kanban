apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-admin
  labels: {{- include "azeroth-kanban.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.db }}?schema=public"
  AUTH_SECRET: {{ .Values.admin.authSecret | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-admin
  labels: {{- include "azeroth-kanban.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: admin
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.admin.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-admin
  labels: {{- include "azeroth-kanban.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: admin
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: admin
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      containers:
        - name: admin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.admin.port }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.admin.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: POSTGRES_HOST
              value: {{ .Release.Name }}-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: NEXTAUTH_URL
              value: "http://{{ .Values.ingress.host }}"
            - name: AUTH_TRUST_HOST
              value: "true"
            - name: AUTH_ALLOW_CREDENTIALS
              value: {{ .Values.admin.authAllowCredentials | quote }}
            - name: NEXT_PUBLIC_AUTH_KEYCLOAK_ENABLED
              value: {{ .Values.admin.authKeycloakEnabled | quote }}
            {{- if .Values.admin.authKeycloakIssuer }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.admin.authKeycloakIssuer | quote }}
            - name: AUTH_KEYCLOAK_ID
              value: {{ .Values.admin.authKeycloakClientId | quote }}
            - name: AUTH_KEYCLOAK_SECRET
              value: {{ .Values.admin.authKeycloakClientSecret | quote }}
            {{- end }}
            - name: SEED_ON_START
              value: {{ .Values.admin.seedOnStart | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-admin
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-admin
                  key: AUTH_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.admin.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.admin.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-admin
  labels: {{- include "azeroth-kanban.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-admin
                port:
                  number: 80
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: ["{{ .Values.ingress.host }}"]
      secretName: {{ .Release.Name }}-tls
  {{- end }}
{{- end }}
