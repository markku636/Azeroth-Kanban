services:
  # ─── PostgreSQL 資料庫 ───
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak OIDC 身分提供者 ───
  # KC_HOSTNAME_URL 使用 host.docker.internal，讓「瀏覽器 (host)」與「admin 容器」都能透過同一個 URL 解析
  #   - Windows / Mac Docker Desktop：原生支援 host.docker.internal
  #   - Linux：需要在 host 的 /etc/hosts 加上 `127.0.0.1 host.docker.internal`
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: kanban-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: host.docker.internal
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── 後台管理 (Next.js Admin) ───
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: kanban-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:-kanban_secret}@postgres:5432/${POSTGRES_DB:-kanban}?schema=public"
      NEXTAUTH_URL: http://localhost:3010
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-to-a-32-byte-random-string}
      AUTH_TRUST_HOST: "true"
      # Keycloak — issuer 必須與 token iss claim 一致；admin 容器透過 host-gateway 可解析此 URL
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-kanban-admin}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET:-kanban-admin-secret}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:-http://host.docker.internal:8080/realms/kanban}
      # 帳密登入（Demo 主流程）
      AUTH_ALLOW_CREDENTIALS: ${AUTH_ALLOW_CREDENTIALS:-true}
      # Keycloak SSO 按鈕在登入頁是否顯示（預設關閉，避免被導去 Keycloak）
      NEXT_PUBLIC_AUTH_KEYCLOAK_ENABLED: ${NEXT_PUBLIC_AUTH_KEYCLOAK_ENABLED:-false}
      # entrypoint.sh nc 等待目標
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      # 啟動時自動跑 seed（idempotent / upsert）；想跳過設為 false
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "3010:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
