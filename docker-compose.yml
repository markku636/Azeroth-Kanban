

services:
  # ─── PostgreSQL 資料庫 ───
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban_secret
      POSTGRES_DB: kanban
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanban"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── 後台管理 (Next.js Admin) ───
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: kanban-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://kanban:kanban_secret@postgres:5432/kanban?schema=public"
      NEXTAUTH_URL: http://localhost:3010
      AUTH_SECRET: your-nextauth-secret-change-me
      AUTH_TRUST_HOST: "true"
    ports:
      - "3010:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
